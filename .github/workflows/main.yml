name: Frontend CI Pipeline

# Trigger the workflow on pushes or pull requests to the main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone your portfolio repository onto the GitHub runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4 # <-- Fixed this line (removed /uses)
        with:
          node-version: 20
          cache: "npm"

      # Step 3: Clean install your project dependencies
      - name: Install Dependencies
        run: npm ci

      # Step 4: Run ESLint to catch formatting and syntax errors
      # (This assumes you have a "lint" script in your package.json)
      - name: Check Code Quality (Lint)
        run: npm run lint

      # Step 5: Try compiling the project to make sure it builds without breaking
      - name: Build Production Bundle
        run: npm run build
